name: CI

# Runs on pull requests targeting the default branch so a green check can be
# trusted (e.g. to auto-merge low-risk dependency bumps). Deploys stay in
# CircleCI (.circleci/config.yml) — this workflow only validates PRs.
on:
  pull_request:
    branches: [main]

# Least privilege: PR validation needs no write scopes.
permissions:
  contents: read

# Cancel superseded runs on the same PR to keep feedback fast.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-site:
    name: Build site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      # npm ci installs the exact lockfile versions, so a bumped dependency is
      # the version actually exercised by the build.
      - run: npm ci
      # The only real check the root project defines: `skier` builds the site.
      - run: npm run build

  typecheck-functions:
    name: Typecheck functions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      # `build` is `tsc` — compiles the OAuth gateway, i.e. a typecheck.
      - run: npm run build
